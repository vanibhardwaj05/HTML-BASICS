<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle CSS</title>

    <style>
        .highlight {
            color: white;
            background-color: blue;
            font-size: 20px;
            padding: 10px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <p class="demo">Hello World</p>
    <p class="demo">JavaScript Example</p>

    <button onclick="toggleCSS()">Click Me</button>

    <script>
        function toggleCSS() {
            let elements = document.getElementsByClassName("demo");

            for (let i = 0; i < elements.length; i++) {
                elements[i].classList.toggle("highlight");
            }
        }
    </script>

</body>
</html>
