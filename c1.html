<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Remove CSS</title>

    <style>
        .highlight {
            color: white;
            background-color: green;
            font-size: 20px;
            padding: 10px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    
    
    <p class="demo">Hello World</p>
    <p class="demo">JavaScript Class Selector</p>

    <button onclick="addCSS()">Add CSS</button>
    <button onclick="removeCSS()">Remove CSS</button>

    <script>
        function addCSS() {
            let elements = document.getElementsByClassName("demo");

            for (let i = 0; i < elements.length; i++) {
                elements[i].classList.add("highlight");
            }
        }

        function removeCSS() {
            let elements = document.getElementsByClassName("demo");

            for (let i = 0; i < elements.length; i++) {
                elements[i].classList.remove("highlight");
            }
        }
    </script>

</body>
</html>
